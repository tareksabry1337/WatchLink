name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  host-tests:
    name: Host + Core tests (iOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
      - name: Xcode version
        run: xcodebuild -version
      - name: Test
        run: |
          xcodebuild test \
            -scheme WatchLink-Package \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -only-testing:WatchLinkCoreTests \
            -only-testing:WatchLinkHostTests

  watch-tests:
    name: Watch + Core tests (watchOS Simulator)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'
      - name: Xcode version
        run: xcodebuild -version
      - name: Test
        run: |
          xcodebuild test \
            -scheme WatchLink-Package \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 11 (46mm),OS=latest' \
            -only-testing:WatchLinkCoreTests \
            -only-testing:WatchLinkTests
